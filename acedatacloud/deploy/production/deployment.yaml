apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: mcp-acedatacloud
  name: mcp-acedatacloud
  namespace: acedatacloud
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: mcp-acedatacloud
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: mcp-acedatacloud
    spec:
      containers:
        - name: mcp-acedatacloud
          image: ghcr.io/acedatacloud/mcp-acedatacloud:${TAG}
          imagePullPolicy: IfNotPresent
          env:
            # Enables OAuth 2.1 (DCR) — delegates login to auth.acedata.cloud and
            # issues the user's 15-day JWT as the access token (accepted by the
            # management API). No per-user platform token needs to be configured.
            - name: MCP_SERVER_URL
              value: "https://mcp.acedata.cloud"
            - name: ACEDATACLOUD_OAUTH_CLIENT_ID
              value: "jzgkKj3lhBNXLb73kw9M-2ZuDuRYoUf73CUcY_P4QII"
          ports:
            - containerPort: 8000
              protocol: TCP
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 30m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
      dnsPolicy: ClusterFirst
      imagePullSecrets:
        - name: docker-registry
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
