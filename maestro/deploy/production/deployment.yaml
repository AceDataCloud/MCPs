apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: mcp-maestro
  name: mcp-maestro
  namespace: acedatacloud
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: mcp-maestro
  template:
    metadata:
      labels:
        app: mcp-maestro
    spec:
      containers:
        - name: mcp-maestro
          image: ghcr.io/acedatacloud/mcp-maestro:${TAG}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: MCP_SERVER_URL
              value: "https://maestro.mcp.acedata.cloud"
            - name: ACEDATACLOUD_OAUTH_CLIENT_ID
              value: "ebTMgx6xsrzzmRDjSgTdkwsA0mVqV8Grn0x3yvjq7o4"
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 30m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
      imagePullSecrets:
        - name: docker-registry