name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changes.outputs.matrix }}
      has_changes: ${{ steps.changes.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed MCP subdirectories
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin ${{ github.base_ref }} --depth=1 2>/dev/null || true
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD)
          fi

          DIRS=$(ls -d */ 2>/dev/null | grep -v '^\.' | sed 's|/||' | grep -v '^\.github$')
          MATRIX="[]"
          HAS_CHANGES="false"

          for dir in $DIRS; do
            if [ -f "$dir/pyproject.toml" ] && echo "$CHANGED" | grep -q "^${dir}/"; then
              MATRIX=$(echo "$MATRIX" | jq -c --arg d "$dir" '. + [$d]')
              HAS_CHANGES="true"
            fi
          done

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "has_changes=$HAS_CHANGES" >> $GITHUB_OUTPUT
          echo "Changed MCPs: $MATRIX"

  lint:
    name: Lint (${{ matrix.mcp }})
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mcp: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ${{ matrix.mcp }}
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Run Ruff linter
        working-directory: ${{ matrix.mcp }}
        run: ruff check .

      - name: Run Ruff formatter check
        working-directory: ${{ matrix.mcp }}
        run: ruff format --check .

      - name: Run mypy
        working-directory: ${{ matrix.mcp }}
        run: mypy core tools main.py

  test:
    name: Test (${{ matrix.mcp }}, Python ${{ matrix.python-version }})
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mcp: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: ${{ matrix.mcp }}
        run: |
          python -m pip install --upgrade pip
          pip install ".[test]"

      - name: Run tests
        working-directory: ${{ matrix.mcp }}
        run: pytest --cov=core --cov=tools --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v6
        with:
          files: ${{ matrix.mcp }}/coverage.xml
          flags: ${{ matrix.mcp }}
          fail_ci_if_error: false

  build:
    name: Build (${{ matrix.mcp }})
    needs: [detect-changes, lint, test]
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mcp: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        working-directory: ${{ matrix.mcp }}
        run: python -m build

      - name: Check package
        working-directory: ${{ matrix.mcp }}
        run: |
          pip install twine
          twine check dist/*
