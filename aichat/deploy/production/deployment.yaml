apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: mcp-aichat
  name: mcp-aichat
  namespace: acedatacloud
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: mcp-aichat
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: mcp-aichat
    spec:
      containers:
        - name: mcp-aichat
          image: ghcr.io/acedatacloud/mcp-aichat:${TAG}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: MCP_SERVER_URL
              value: "https://aichat.mcp.acedata.cloud"
            - name: ACEDATACLOUD_OAUTH_CLIENT_ID
              value: "9qTprfZDnC6_gKS6RC_gPXWIKcTx-5hHiqUJIaP8Z-4"
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 30m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
      dnsPolicy: ClusterFirst
      imagePullSecrets:
        - name: docker-registry
      restartPolicy: Always
      terminationGracePeriodSeconds: 30